%YAML 1.1
---
actions:
- utter_ask_for_name_on_reservation
- utter_ask_for_polar_on_general_correctness_confirmatioutter_ask_for_polar_on_general_correctness_confirmation
- utter_ask_for_polar_and_or_time_on_alternative_potential_reservation_time
- utter_ask_for_time_for_potential_reservation
- utter_ask_for_number_on_reservation_size
- utter_respond_with_affirm_restaurant_accepts_reservations_AND_ask_for_polar_on_if_reservation_wanted
- utter_respond_with_informing_no_reservation_availability_at_specificied_time_AND_ask_for_polar_and_or_time_for_alternative_potential_reservation_time
- utter_doing_greet
- utter_request_time_too_early
- utter_time_within
- utter_respond_with_affirm_need_reservation
- action_uttter_respond_your_welcome_AND_and_for_next_general_request_while_clearing_slots
- action_utter_doing_think_AND_ask_for_next_general_request_while_clearing_slots
- action_utter_goodbye_while_clearing_slots
- action_check_time_open
- action_update_reservation
- action_check_is_open
- action_check_reservation_datetime
- action_set_scheduled_time_slot
- action_utter_ask_for_polar_on_potential_time_within_close_to_request
- action_utter_you_are_set
- action_listen
- action_affirm_similar_time_ordinal
- action_post_reservation_saved
- action_alert_business
- action_set_size_slot
- action_order
- action_ask_is_close_time_okay
- action_check_time_close
- action_save_reservation
- action_check_time_close_on_day
- action_check_is_open_on_day
- action_utter_ask_for_polar_or_ordinal_or_time_on_which_if_any_alternative_potential_times_for_reservation_acceptable
- action_check_menu_item
- action_check_time_open_on_day
- action_branacher_determine_response_to_check_time_open
- action_brancher_determine_response_to_check_is_currently_open
- action_brancher_query_reservation_platform
- action_brancher_determine_action_after_reservation_time_selected
- action_brancher_validate_number_size
config:
  store_entities_as_slots: true
entities:
- DATE
- item
- name
- ordinal
- number
- TIME
- size
- CARDINAL
- ORG
- time
- ORDINAL
forms: []
intents:
- time_open
- is_open
- make_reservation
- inform
- affirm
- goodbye
- greet
- thank
- deny
- time_close
- menu_item
- need_reservation
- allow_reservations
- order
- restart
- busy
slots:
  business_id:
    auto_fill: true
    type: rasa_core.slots.TextSlot
  name:
    auto_fill: true
    type: rasa_core.slots.TextSlot
  potential_times:
    auto_fill: true
    type: rasa_core.slots.ListSlot
  recipient_contact:
    auto_fill: true
    type: rasa_core.slots.TextSlot
  recipient_id:
    auto_fill: true
    type: rasa_core.slots.TextSlot
  scheduled_time:
    auto_fill: true
    type: rasa_core.slots.TextSlot
  size:
    auto_fill: true
    type: rasa_core.slots.TextSlot
templates:
  utter_respond_with_affirm_restaurant_accepts_reservations_AND_ask_for_polar_on_if_reservation_wanted:
  - text: Yes! Would you like to make one?
  utter_ask_for_polar_on_general_correctness_confirmation:
  - text: Is this correct?
  utter_ask_for_name_on_reservation:
  - text: What's the name for the reservation?
  utter_ask_for_number_on_reservation_size:
  - text: What's the size of the party?
  utter_ask_for_time_for_potential_reservation:
  - text: Sure, what time?
  utter_do_you_have_another_date_in_mind:
  - text: Do you have another date in mind?
  utter_doing_greet:
  - text: Hey, how can I help you?
  utter_respond_with_affirm_need_reservation:
  - text: It can never hurt
  utter_respond_with_informing_no_reservation_availability_at_specificied_time_AND_ask_for_polar_and_or_time_for_alternative_potential_reservation_time:
  - text: Sorry, but we don't have any reservations available at that time, do you have another time in mind?
  utter_request_time_too_early:
  - text: Sorry, but you can only request reservations that are more than five minutes
      from now
  utter_restart:
  - text: Restarted
  utter_thank:
  - text: Thanks
