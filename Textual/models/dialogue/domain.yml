%YAML 1.1
---
actions:
- utter_greet
- utter_goodbye
- utter_your_welcome
- utter_ask_name
- utter_ask_time
- utter_ask_size
- utter_thank
- utter_ask_confirmation
- action_check_is_open
- action_check_is_open_on_day
- action_check_time_close
- action_check_time_close_on_day
- action_check_time_open
- action_check_time_open_on_day
- action_check_menu_item
- action_update_reservation
- utter_need_reservation
- utter_allow_reservations_and_ask
- action_order
- action_alert_business
config:
  store_entities_as_slots: true
entities:
- name
- time
- item
- size
intents:
- greet:
    use_entities: true
- thank:
    use_entities: true
- goodbye:
    use_entities: true
- inform:
    use_entities: true
- affirm:
    use_entities: true
- deny:
    use_entities: true
- is_open:
    use_entities: true
- time_close:
    use_entities: true
- time_open:
    use_entities: true
- menu_item:
    use_entities: true
- make_reservation:
    use_entities: true
- need_reservation:
    use_entities: true
- allow_reservations:
    use_entities: true
- order:
    use_entities: true
- restart:
    use_entities: true
- busy:
    use_entities: true
slots:
  business_id:
    initial_value: null
    type: rasa_core.slots.TextSlot
  name:
    initial_value: null
    type: rasa_core.slots.TextSlot
  recipient_contact:
    initial_value: null
    type: rasa_core.slots.TextSlot
  recipient_id:
    initial_value: null
    type: rasa_core.slots.TextSlot
  scheduled_time:
    initial_value: null
    type: rasa_core.slots.TextSlot
  size:
    initial_value: null
    type: rasa_core.slots.TextSlot
templates:
  utter_allow_reservations_and_ask:
  - text: Yes! Would you like to make one?
  utter_ask_confirmation:
  - text: Is this correct?
  utter_ask_name:
  - text: What's the name for the reservation?
  utter_ask_size:
  - text: What's the size of the party?
  utter_ask_time:
  - text: What time's the reservation for?
  utter_goodbye:
  - text: Goodbye
  utter_greet:
  - text: Hey, how can I help you?
  utter_need_reservation:
  - text: It can never hurt
  utter_restart:
  - text: Restarted
  utter_thank:
  - text: Thanks
  utter_your_welcome:
  - text: Your welcome
