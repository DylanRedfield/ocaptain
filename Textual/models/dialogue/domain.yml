%YAML 1.1
---
actions:
- utter_no_reservation_available
- action_check_is_open
- utter_need_reservation
- action_update_reservation
- action_post_reservation_saved
- utter_thank
- utter_goodbye
- action_set_size_slot
- action_check_menu_item
- utter_ask_time
- action_listen
- utter_do_you_have_another_date_in_mind
- action_check_is_open_on_day
- action_alert_business
- action_check_time_close
- utter_ask_name
- utter_greet
- utter_your_welcome
- utter_ask_confirmation
- utter_time_within
- action_check_time_open_on_day
- action_save_reservation
- action_utter_you_are_set
- utter_ask_size
- action_utter_ask_is_other_reservation_time_okay
- action_affirm_similar_time_ordinal
- action_check_reservation_datetime
- action_ask_if_any_similar_times_work
- action_check_time_open
- action_check_time_close_on_day
- utter_no_reservations_available
- action_order
- action_ask_is_close_time_okay
- utter_allow_reservations_and_ask
- action_set_scheduled_time_slot
- utter_request_time_too_early
config:
  store_entities_as_slots: true
entities:
- CARDINAL
- DATE
- name
- ordinal
- number
- size
- item
- TIME
- ORDINAL
- ORG
- time
forms: []
intents:
- make_reservation:
    use_entities: true
- inform:
    use_entities: true
- affirm:
    use_entities: true
- goodbye:
    use_entities: true
- greet:
    use_entities: true
- thank:
    use_entities: true
- deny:
    use_entities: true
- is_open:
    use_entities: true
- time_close:
    use_entities: true
- time_open:
    use_entities: true
- menu_item:
    use_entities: true
- need_reservation:
    use_entities: true
- allow_reservations:
    use_entities: true
- order:
    use_entities: true
- restart:
    use_entities: true
- busy:
    use_entities: true
slots:
  business_id:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.TextSlot
  name:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.TextSlot
  potential_times:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.ListSlot
  recipient_contact:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.TextSlot
  recipient_id:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.TextSlot
  scheduled_time:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.TextSlot
  size:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.TextSlot
templates:
  utter_allow_reservations_and_ask:
  - text: Yes! Would you like to make one?
  utter_ask_confirmation:
  - text: Is this correct?
  utter_ask_name:
  - text: What's the name for the reservation?
  utter_ask_size:
  - text: What's the size of the party?
  utter_ask_time:
  - text: Sure, what time?
  utter_do_you_have_another_date_in_mind:
  - text: Do you have another date in mind?
  utter_goodbye:
  - text: Goodbye
  utter_greet:
  - text: Hey, how can I help you?
  utter_need_reservation:
  - text: It can never hurt
  utter_no_reservation_available:
  - text: Sorry, but we don't have any reservations available at that time
  utter_request_time_too_early:
  - text: Sorry, but you can only request reservations that are more than five minutes
      from now
  utter_restart:
  - text: Restarted
  utter_thank:
  - text: Thanks
  utter_your_welcome:
  - text: Your welcome
