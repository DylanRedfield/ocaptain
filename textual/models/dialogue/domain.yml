config:
  store_entities_as_slots: true
entities:
- ordinal
- number
- size
- DATE
- ORDINAL
- name
- TIME
- item
- time
forms: []
intents:
- make_reservation:
    use_entities: true
- inform:
    use_entities: true
- time_open:
    use_entities: true
- is_open:
    use_entities: true
- affirm:
    use_entities: true
- goodbye:
    use_entities: true
- greet:
    use_entities: true
- thank:
    use_entities: true
- deny:
    use_entities: true
- time_close:
    use_entities: true
- menu_item:
    use_entities: true
- need_reservation:
    use_entities: true
- allow_reservations:
    use_entities: true
- order:
    use_entities: true
- restart:
    use_entities: true
- busy:
    use_entities: true
slots:
  alternative_times:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.ListSlot
  business_id:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  name:
    auto_fill: true
    initial_value: null
    type: rasa_core.slots.TextSlot
  potential_hour:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  potential_size:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  potential_time:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  potential_times:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.ListSlot
  recipient_contact:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  recipient_id:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  scheduled_time:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  size:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  temp_ordinal:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.TextSlot
  temp_times:
    auto_fill: false
    initial_value: null
    type: rasa_core.slots.ListSlot
templates:
  utter_ask_for_name_on_reservation:
  - text: What's the name for the reservation?
  utter_ask_for_number_on_reservation_size:
  - text: What's the size of the party?
  utter_ask_for_polar_on_general_correctness_confirmation:
  - text: Is this correct?
  utter_ask_for_polar_on_is_pm:
  - text: Is that PM?
  utter_ask_for_time_for_potential_reservation:
  - text: Sure, what time?
  utter_do_you_have_another_date_in_mind:
  - text: Do you have another date in mind?
  utter_doing_greet:
  - text: Hey, how can I help you?
  utter_doing_no_tables_available_near_that_time_AND_ask_for_polar_or_time_on_alternative:
  - text: Sorry, we don't have another within a few hours of that. Do you have another
      time in mind?
  utter_request_time_too_early:
  - text: Sorry, but you can only request reservations that are more than five minutes
      from now
  utter_requested_time_too_soon_AND_ask_for_polar_or_time_on_alternative:
  - text: Sorry, but that time is too close to now. Do you have another in mind?
  utter_respond_with_affirm_need_reservation:
  - text: It can never hurt
  utter_respond_with_affirm_restaurant_accepts_reservations_AND_ask_for_polar_on_if_reservation_wanted:
  - text: Yes! Would you like to make one?
  ? utter_respond_with_informing_no_reservation_availability_at_specificied_time_AND_ask_for_polar_and_or_time_for_alternative_potential_reservation_time
  : - text: Sorry, but we don't have any reservations available at that time, do you
        have another time in mind?
  utter_restart:
  - text: Restarted
  utter_thank:
  - text: Thanks
  utter_unhappy_doing_invalid_size_AND_ask_for_size_greater_than_zero:
  - text: Please enter a number greater than zero
  utter_unhappy_doing_no_number_recognized:
  - text: Sorry I don't recoginze a table size
  utter_unhappy_doing_request_customer_call_for_large_parties:
  - text: I'm sorry but for parties that large, it's best to give us a call
